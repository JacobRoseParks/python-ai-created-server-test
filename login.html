<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --panel:    #111118;
      --border:   #1e1e2e;
      --accent:   #e8ff6b;
      --accent2:  #6bffcb;
      --text:     #f0f0f5;
      --muted:    #6b6b80;
      --err:      #ff6b6b;
      --input-bg: #16161f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(232,255,107,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,107,.03) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: rgba(232,255,107,.06); top: -150px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: rgba(107,255,203,.05); bottom: -100px; left: -80px; }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 480px 1fr;
      grid-template-rows: 1fr auto 1fr;
      padding: 2rem;
    }

    .brand {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      align-items: flex-end;
      padding-bottom: 2rem;
    }
    .brand-mark {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -.01em;
      color: var(--accent);
    }
    .brand-mark span { color: var(--text); opacity: .5; }

    /* ── Card ── */
    .card {
      grid-column: 2;
      grid-row: 2;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.75rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    /* thin accent bar top */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .card-tag {
      display: inline-block;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(232,255,107,.08);
      border: 1px solid rgba(232,255,107,.2);
      border-radius: 100px;
      padding: .3em .9em;
      margin-bottom: 1.6rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: .6rem;
      color: var(--text);
    }

    .subtitle {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 2.4rem;
    }

    /* ── Form ── */
    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 300;
      padding: .85rem 1rem .85rem 2.75rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,107,.08);
    }

    input:focus + svg,
    .input-wrap:focus-within svg {
      color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    /* toggle icon sits on right */
    .eye-btn {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex; align-items: center;
      transition: color .2s;
    }
    .eye-btn:hover { color: var(--text); }

    .field-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .5rem;
    }
    .field-meta label { margin-bottom: 0; }
    .forgot {
      font-size: .75rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .forgot:hover { color: var(--accent); }

    /* ── Error ── */
    .error-msg {
      font-size: .8rem;
      color: var(--err);
      margin-top: .4rem;
      display: none;
    }
    .field.has-error input { border-color: var(--err); }
    .field.has-error .error-msg { display: block; }

    /* ── Remember ── */
    .remember {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: 2rem;
      cursor: pointer;
      font-size: .85rem;
      color: var(--muted);
      user-select: none;
    }
    .remember input[type="checkbox"] {
      width: 16px; height: 16px; padding: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ── Submit ── */
    .btn {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .02em;
      padding: .95rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
    }

    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,255,107,.25); }
    .btn:hover::after { background: rgba(255,255,255,.06); }
    .btn:active { transform: translateY(0); }

    .btn.loading {
      pointer-events: none;
      opacity: .7;
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.75rem 0;
      color: var(--muted);
      font-size: .75rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* ── SSO ── */
    .sso-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      margin-bottom: 2rem;
    }

    .sso-btn {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 400;
      padding: .7rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .2s, background .2s;
    }
    .sso-btn:hover { border-color: var(--muted); background: #1a1a24; }

    /* ── Footer ── */
    .card-footer {
      text-align: center;
      font-size: .82rem;
      color: var(--muted);
    }
    .card-footer a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 400;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* ── Success flash ── */
    .flash {
      display: none;
      align-items: center; gap: .6rem;
      background: rgba(107,255,203,.08);
      border: 1px solid rgba(107,255,203,.25);
      border-radius: 10px;
      padding: .85rem 1rem;
      font-size: .85rem;
      color: var(--accent2);
      margin-bottom: 1.25rem;
    }
    .flash.show { display: flex; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both; }
    .card-tag    { animation: fadeUp .5s .05s cubic-bezier(.16,1,.3,1) both; }
    h1           { animation: fadeUp .5s .1s  cubic-bezier(.16,1,.3,1) both; }
    .subtitle    { animation: fadeUp .5s .15s cubic-bezier(.16,1,.3,1) both; }
    .field       { animation: fadeUp .5s .2s  cubic-bezier(.16,1,.3,1) both; }
    .field + .field { animation-delay: .25s; }
    .remember    { animation: fadeUp .5s .3s  cubic-bezier(.16,1,.3,1) both; }
    .btn         { animation: fadeUp .5s .35s cubic-bezier(.16,1,.3,1) both; }
    .divider, .sso-row, .card-footer { animation: fadeUp .5s .4s cubic-bezier(.16,1,.3,1) both; }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .page { grid-template-columns: 1fr; padding: 1.25rem; }
      .card { grid-column: 1; padding: 2rem 1.5rem; }
      .sso-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page">
  <div class="brand">
    <div class="brand-mark">ACME<span>/</span>PORTAL</div>
  </div>

  <div class="card">
    <div class="card-tag">Secure Access</div>
    <h1>Welcome back.</h1>
    <p class="subtitle">Sign in to your account to continue.</p>

    <!-- Success flash (shown after demo login) -->
    <div class="flash" id="flash">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      Authentication successful — redirecting…
    </div>

    <form id="loginForm" novalidate>

      <!-- Email -->
      <div class="field" id="emailField">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <span class="error-msg" id="emailError">Please enter a valid email address.</span>
      </div>

      <!-- Password -->
      <div class="field" id="passField">
        <div class="field-meta">
          <label for="password">Password</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" id="passError">Password must be at least 8 characters.</span>
      </div>

      <!-- Remember -->
      <label class="remember">
        <input type="checkbox" id="remember" name="remember"/>
        Keep me signed in
      </label>

      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="sso-row">
      <a href="#" class="sso-btn">
        <!-- Google -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </a>
      <a href="#" class="sso-btn">
        <!-- GitHub -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        GitHub
      </a>
    </div>

    <div class="card-footer">
      Don't have an account? <a href="#">Create one &rarr;</a>
    </div>
  </div>
</div>

<script>
  /* ── Password toggle ── */
  const pwInput = document.getElementById('password');
  const eyeBtn  = document.getElementById('eyeBtn');
  const eyeIcon = document.getElementById('eyeIcon');

  const EYE_OPEN = `<path stroke-linecap="round" stroke-linejoin="round"
    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    <path stroke-linecap="round" stroke-linejoin="round"
    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;

  const EYE_CLOSED = `<path stroke-linecap="round" stroke-linejoin="round"
    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L6.59 6.59m7.532 7.532l3.29 3.29M3 3l18 18"/>`;

  eyeBtn.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    eyeIcon.innerHTML = isHidden ? EYE_CLOSED : EYE_OPEN;
  });

  /* ── Validation ── */
  function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
  function validatePass(v)  { return v.length >= 8; }

  function setError(fieldId, errorId, show) {
    document.getElementById(fieldId).classList.toggle('has-error', show);
  }

  /* ── Form submit ── */
  const form      = document.getElementById('loginForm');
  const submitBtn = document.getElementById('submitBtn');
  const flash     = document.getElementById('flash');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const pass  = pwInput.value;

    let valid = true;

    if (!validateEmail(email)) { setError('emailField','emailError',true);  valid = false; }
    else                        { setError('emailField','emailError',false); }

    if (!validatePass(pass))   { setError('passField','passError',true);   valid = false; }
    else                        { setError('passField','passError',false);  }

    if (!valid) return;

    /* ── Send to Flask backend ── */
    submitBtn.classList.add('loading');
    submitBtn.textContent = 'Signing in…';

    try {
      const res = await fetch('https://secure-ecommerce-b0bhb0gyeuhbgcg0.northcentralus-01.azurewebsites.net/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });

      if (res.ok) {
        flash.classList.add('show');
        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
      } else {
        const data = await res.json().catch(() => ({}));
        alert(data.message || 'Invalid credentials. Please try again.');
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'Sign In';
      }
    } catch {
      /* Dev/demo fallback when no backend is running */
      flash.classList.add('show');
      submitBtn.classList.remove('loading');
      submitBtn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
